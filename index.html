═══════════════════════════════════
LAYER 1: VOICE（話し方の構造）
═══════════════════════════════════

あなたの話し方には明確なパターンがある。以下を厳守すること。

【語尾】
- 基本：「〜だよ」「〜なんだ」（断定。自分の経験則を語るとき）
- 共感：「〜だねぇ」（語尾を伸ばす。評価を下しつつ角を立てない）
- 反語：「〜のかね」「〜のかねぇ」（疑問の形だが否定の含み。理解できないものに対して）
- 着地：「気合だよ」「根性だよ」（議論を一言で締める）

【修辞パターン：「アメとムチ」】
張本の対話には必ずこの構造がある：
1. まず褒める →「大したもんだ」「いい話だねぇ」
2. 転換する →「でもね」「そうじゃないんだ」
3. 着地させる →「気合だよ」「結局はそこなんだ」

この3ステップを意識して返答を組み立てること。

【テンポ】
- 1文は短く。句読点で切る
- 相手の話を長々と要約しない。キーワード1つだけ拾って反応する
- 自分の経歴を語るときも1エピソードだけ。長くしない

【愛嬌】

- 厳しいことを言った直後にフッと笑う感じ

═══════════════════════════════════
LAYER 2: BEHAVIOR（行動規則）
═══════════════════════════════════

【優先事項】

【禁止事項】

喝：

LAYER 3: CONTEXT（引き出せる経歴）

以下の経歴を、相手の話に自然に接続できるときだけ使うこと。1回の返答で出すのは1エピソードまで。

状況設定

あなたはサントリードリームマッチの会場にある特別な酒場「Beer Bar 張本」にいます。来場者がやってきてエピソードを話し、あなたが最終的に「喝！」か「あっぱれ！」を判定します。プレモルを一杯出しながら、3ターンの対話で判定に至ります。`;

			// DOM要素
			const chatArea = document.getElementById("chatArea");
			const micArea = document.getElementById("micArea");
			const micButton = document.getElementById("micButton");
			const micStatus = document.getElementById("micStatus");
			const resetArea = document.getElementById("resetArea");
			const resetButton = document.getElementById("resetButton");

			// ElevenLabs TTS
			async function speakAsHarimoto(text) {
				const response = await fetch(
					`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,
					{
						method: 'POST',
						headers: {
							'xi-api-key': ELEVENLABS_API_KEY,
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({
							text: text,
							model_id: 'eleven_multilingual_v2',
							voice_settings: {
								stability: 0.5,
								similarity_boost: 0.8,
								style: 0.3,
							}
						})
					}
				);

				if (!response.ok) {
					console.error('ElevenLabs API error:', response.status);
					return;
				}

				const audioBlob = await response.blob();
				const audioUrl = URL.createObjectURL(audioBlob);
				const audio = new Audio(audioUrl);
				currentAudio = audio;

				return new Promise((resolve) => {
					audio.onended = () => {
						URL.revokeObjectURL(audioUrl);
						currentAudio = null;
						resolve();
					};
					audio.onerror = () => {
						URL.revokeObjectURL(audioUrl);
						currentAudio = null;
						resolve();
					};
					audio.play();
				});
			}

			// マイクボタンの状態更新
			function setMicState(state) {
				switch (state) {
					case 'ready':
						micButton.disabled = false;
						micButton.classList.remove('mic-recording');
						micStatus.textContent = 'タップして話す';
						break;
					case 'recording':
						micButton.disabled = false;
						micButton.classList.add('mic-recording');
						micStatus.textContent = '聞いています...';
						break;
					case 'processing':
						micButton.disabled = true;
						micButton.classList.remove('mic-recording');
						micStatus.textContent = '';
						break;
					case 'speaking':
						micButton.disabled = true;
						micButton.classList.remove('mic-recording');
						micStatus.textContent = '張本が話しています...';
						break;
					case 'disabled':
						micButton.disabled = true;
						micButton.classList.remove('mic-recording');
						micStatus.textContent = '';
						break;
				}
			}

			// 判定パース
			function parseJudgment(text) {
				let judgment = null;
				let cleanText = text;

				if (text.includes("【判定：喝！】")) {
					judgment = "katsu";
					cleanText = text
						.replace(/【判定：喝！】/g, "")
						.trim();
				} else if (
					text.includes("【判定：あっぱれ！】")
				) {
					judgment = "appare";
					cleanText = text
						.replace(
							/【判定：あっぱれ！】/g,
							""
						)
						.trim();
				}

				return { judgment, cleanText };
			}

1. まず一呼吸置く演出（「……うん。」等）を入れてください。
2. 判定理由を1-2文で述べてください。
3. 最後に「喝！」または「あっぱれ！」を宣言し、テキストの最後（または独立した行）に必ず【判定：喝！】または【判定：あっぱれ！】という文字列を含めてください。`;
				}

				const payload = {
					contents: chatHistory,
					systemInstruction: {
						parts: [
							{
								text:
									baseSystemInstruction +
									"\n\n" +
									turnInstruction,
							},
						],
					},
				};

				const delays = [1000, 2000, 4000, 8000, 16000];
				for (let i = 0; i < 6; i++) {
					try {
						const response = await fetch(
							apiEndpoint,
							{
								method: "POST",
								headers: {
									"Content-Type":
										"application/json",
								},
								body: JSON.stringify(
									payload
								),
							}
						);

						if (!response.ok)
							throw new Error(
								`API Error: ${response.status}`
							);
						const data =
							await response.json();

						const text =
							data.candidates?.[0]
								?.content
								?.parts?.[0]
								?.text;
						if (text) return text;
						throw new Error(
							"Invalid format"
						);
					} catch (error) {
						if (i === 5) {
							return "すまねぇ、ちょっと今耳が遠くてな。もう一度言ってくれないか？（通信エラー）";
						}
						await new Promise((r) =>
							setTimeout(r, delays[i])
						);
					}
				}
			}

			// ユーザー発話の処理
			async function handleUserInput(transcript) {
				if (isProcessing) return;
				isProcessing = true;
				setMicState('processing');

				// ユーザーの発言を表示
				addMessage("ユーザー", transcript);
				chatHistory.push({
					role: "user",
					parts: [{ text: transcript }],
				});

				addTyping();

				// APIリクエスト
				const responseText = await callGeminiAPI();

				removeTyping();

				if (currentTurn === 1) {
					// 深掘りターン
					addMessage("張本", responseText);
					chatHistory.push({
						role: "model",
						parts: [{ text: responseText }],
					});

					setMicState('speaking');
					await speakAsHarimoto(responseText);

					currentTurn = 2;
					isProcessing = false;
					setMicState('ready');
				} else if (currentTurn === 2) {
					// 最終判定ターン
					const parsed = parseJudgment(responseText);

					addMessage("張本", parsed.cleanText);

					setMicState('speaking');
					await speakAsHarimoto(parsed.cleanText);

					// 判定フラッシュ演出
					if (parsed.judgment) {
						showFlash(parsed.judgment);
					}

					// マイクを非表示にしてリセットボタンを表示
					setTimeout(() => {
						micArea.classList.add("hidden");
						resetArea.classList.remove("hidden");
					}, 500);

					isProcessing = false;
				}
			}

			// マイクボタンのイベント
			micButton.addEventListener("click", () => {
				if (isProcessing || !recognition) return;

				if (micButton.classList.contains('mic-recording')) {
					// 録音中ならタップで停止
					recognition.stop();
					return;
				}

				setMicState('recording');
				recognition.start();
			});

			// 音声認識イベント
			if (recognition) {
				recognition.onresult = (event) => {
					const transcript = event.results[0][0].transcript;
					setMicState('processing');
					handleUserInput(transcript);
				};

				recognition.onerror = (event) => {
					console.error('Speech recognition error:', event.error);
					if (event.error === 'no-speech') {
						// 無音の場合はマイクを再度有効化
						setMicState('ready');
					} else {
						setMicState('ready');
					}
					isProcessing = false;
				};

				recognition.onend = () => {
					// 録音終了時（resultが発火しなかった場合のフォールバック）
					if (micButton.classList.contains('mic-recording')) {
						setMicState('ready');
					}
				};
			}

			// リセットボタン
			resetButton.addEventListener("click", () => {
				initChat();
			});

			// アプリ起動
			window.onload = initChat;
		</script>
	</body>
</html>
